name: Backend CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: docker compose up -d --build
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          # Also include your AI keys here
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODAL_NAME: ${{secrets.MODAL_NAME}}

      # 🟢 THE FIX: Wait for the API to be fully initialized
      - name: Wait for API and Database Setup
        run: |
          echo "Waiting for FastAPI to be ready..."
          # 🟢 This loop now prints logs on failure so you can see the error in real-time
          timeout 90s bash -c 'until curl -s http://localhost:8000/ > /dev/null; do 
            echo "Still waiting... Backend status:"
            docker compose ps
            docker compose logs --tail=10 api
            sleep 5
          done'
          echo "FastAPI is up!"

      # Tests the API
      - name: Test FastAPI Health
        run: |
          # Testing the docs endpoint as requested
          curl -f http://localhost:8000/docs || (docker compose logs && exit 1)

      - name: Stop services
        if: always() # 🟢 Ensures services stop even if tests fail
        run: docker compose down